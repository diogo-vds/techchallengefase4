AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AWS Lambda function for Avaliacao processing

Parameters:
  DynamoDbEndpoint:
    Type: String
    Default: ''
  SqsEndpoint:
    Type: String
    Default: ''

Globals:
  Function:
    Timeout: 60
    MemorySize: 512
    Runtime: java21
    Environment:
      Variables:
        LOG_LEVEL: INFO
        DYNAMODB_TABLE: !Ref AvaliacoesTable
        SQS_QUEUE_URL: !Ref AvaliacoesQueue
        AWS_ENDPOINT_URL_DYNAMODB: !Ref DynamoDbEndpoint
        AWS_ENDPOINT_URL_SQS: !Ref SqsEndpoint

Resources:
  AvaliacaoFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: avaliacao-function
      CodeUri: .
      Handler: br.com.postech.techchallenge.fase4.function.AvaliacaoFunction::handleRequest
      Description: Processa novas avaliações e calcula urgência
      Architectures:
        - x86_64
      EphemeralStorage:
        Size: 512
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AvaliacoesTable
        - SQSSendMessagePolicy:
            QueueName: !GetAtt AvaliacoesQueue.QueueName
      Events:
        ApiEvent:
          Type: Api
          Properties:
            RestApiId: !Ref AvaliacaoApi
            Path: /avaliacao
            Method: POST

  AvaliacoesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: avaliacoes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  AvaliacoesDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: avaliacoes-dlq

  AvaliacoesQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: avaliacoes
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AvaliacoesDeadLetterQueue.Arn
        maxReceiveCount: 3

  AvaliacaoApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: dev
      Name: AvaliacaoAPI
      TracingEnabled: true
      MethodSettings:
        - ResourcePath: '/**'
          HttpMethod: '*'
          LoggingLevel: INFO
          DataTraceEnabled: true
          MetricsEnabled: true

  AvaliacaoFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/aws/lambda/${AvaliacaoFunction}'
      RetentionInDays: 7

Outputs:
  AvaliacaoFunctionArn:
    Description: ARN da Lambda Function
    Value: !GetAtt AvaliacaoFunction.Arn
    Export:
      Name: AvaliacaoFunctionArn

  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub 'https://${AvaliacaoApi}.execute-api.${AWS::Region}.amazonaws.com/dev/'
    Export:
      Name: AvaliacaoApiEndpoint
